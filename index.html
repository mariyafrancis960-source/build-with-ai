<!DOCTYPE html>
<html>
<head>
    <title>SilentSOS</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            margin-top: 100px;
        }

        h1 {
            margin-bottom: 40px;
        }

        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        #btn-fire {
            background-color: red;
            color: white;
        }

        #btn-medical {
            background-color: green;
            color: white;
        }

        #btn-threat {
            background-color: orange;
            color: white;
        }

        button:hover {
            transform: scale(1.1);
            opacity: 0.9;
        }

        .container {
            background: rgba(0,0,0,0.3);
            padding: 40px;
            border-radius: 12px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚨 SilentSOS Emergency System</h1>

        <button id="btn-fire">🔥 Fire</button>
        <button id="btn-medical">🏥 Medical</button>
        <button id="btn-threat">⚠️ Threat</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
